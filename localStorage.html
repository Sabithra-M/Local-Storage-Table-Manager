<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Storage Dashboard</title>
    <style>
        :root {
            --bg: #0b1521;
            --card: rgba(15, 28, 47, 0.96);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e9f2ff;
            --text-muted: rgba(233, 242, 255, 0.72);
            --accent: #22c1c3;
            --accent-alt: #65a7ff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top, rgba(34, 193, 195, 0.16), transparent 30%),
                linear-gradient(135deg, #07101d 0%, #0b1929 100%);
        }

        main {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .hero {
            display: grid;
            gap: 14px;
            margin-bottom: 28px;
        }

        .hero h2 {
            margin: 0;
            font-size: clamp(2rem, 2.5vw, 2.8rem);
            letter-spacing: 0.02em;
        }

        .hero p {
            margin: 0;
            max-width: 680px;
            color: var(--text-muted);
            line-height: 1.7;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.25);
            padding: 28px;
            backdrop-filter: blur(12px);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            align-items: end;
            margin-bottom: 22px;
        }

        input,
        button {
            width: 100%;
            min-height: 52px;
            border-radius: 16px;
            outline: none;
            font-size: 1rem;
        }

        input {
            padding: 0 16px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input::placeholder {
            color: rgba(233, 242, 255, 0.5);
        }

        input:focus {
            border-color: rgba(34, 193, 195, 0.7);
            box-shadow: 0 0 0 4px rgba(34, 193, 195, 0.12);
        }

        button {
            border: none;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--accent), var(--accent-alt));
            box-shadow: 0 14px 28px rgba(34, 193, 195, 0.18);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 36px rgba(34, 193, 195, 0.22);
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 560px;
        }

        th,
        td {
            padding: 16px 18px;
            text-align: left;
        }

        thead {
            background: rgba(255, 255, 255, 0.06);
        }

        th {
            font-size: 0.87rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(233, 242, 255, 0.78);
        }

        tbody tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.2s ease;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        td {
            color: rgba(233, 242, 255, 0.92);
        }

        td button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            transition: background 0.2s ease, transform 0.2s ease;
        }

        td button:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: translateY(-1px);
        }

        footer {
            margin-top: 24px;
            color: rgba(233, 242, 255, 0.52);
            text-align: center;
            font-size: 0.95rem;
        }

        @media (max-width: 680px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            main {
                padding: 28px 16px 48px;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="hero">
            <h2>Local Storage Data Table</h2>
            <p>Save and manage your browser local storage entries with a clean interactive table. Add new key/value pairs, then delete any row instantly.</p>
        </section>

        <section class="card">
            <div class="form-grid">
                <input type="text" id="keyInput" placeholder="Enter Key">
                <input type="text" id="valueInput" placeholder="Enter Value">
                <button onclick="saveData()">Save</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Key</th>
                            <th>Value</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </section>

        <footer>Stored data persists across refreshes until deleted or cleared from local storage.</footer>
    </main>
    
    <script>
        window.onload = function() {
            displayData();
        }

        function saveData() {
            let keyInput = document.getElementById("keyInput").value;
            let valueInput = document.getElementById("valueInput").value;

            if(keyInput == "" || valueInput == "") {
                alert("Please enter both key and value.");
                return;
            }

            localStorage.setItem(keyInput, valueInput);

            document.getElementById("keyInput").value = "";
            document.getElementById("valueInput").value = "";       
            
            displayData();
        }

        function displayData() {
            let tableBody = document.getElementById("tableBody");
            tableBody.innerHTML = "";

            for(let i=0; i<localStorage.length; i++) {
                let leftSideValue = localStorage.key(i);
                let rigthSideValue = localStorage.getItem(leftSideValue);

                let row = `
                <tr>
                    <td>${leftSideValue}</td>
                    <td>${rigthSideValue}</td>
                    <td> <button onclick="deleteBtn('${leftSideValue}')">Delete</button> </td>
                </tr> `;

                tableBody.innerHTML += row;
            }
        }

        function deleteBtn(leftSideValue) {
            localStorage.removeItem(leftSideValue);
            displayData();
        }
    </script>
</body>
</html>
